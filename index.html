<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2027 Budget Timeline</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f7f6f3; color: #1a1a18;
  padding: 28px 20px 40px;
}
h1 { font-size: 19px; font-weight: 500; margin-bottom: 4px; }
.sub { font-size: 12px; color: #888780; margin-bottom: 18px; }
.legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
.leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #5f5e5a; }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; }
.card { border: 0.5px solid #d3d1c7; border-radius: 12px; background: #fff; }
#hdr {
  position: sticky; top: 0; z-index: 30;
  overflow: hidden; background: #faf9f7;
  border-radius: 12px 12px 0 0; border-bottom: 1px solid #ccc9c0;
}
#hdr-inner { display: flex; min-width: 2036px; }
#corner {
  flex: 0 0 440px; position: sticky; left: 0; z-index: 31;
  background: #faf9f7; display: flex;
}
#corner-task {
  width: 280px; flex-shrink: 0; display: flex; flex-direction: column;
  border-right: 0.5px solid #e0ddd6;
}
#corner-notes {
  width: 160px; flex-shrink: 0; display: flex; flex-direction: column;
  border-right: 0.5px solid #e0ddd6;
}
.c-top {
  height: 24px; display: flex; align-items: center;
  padding: 0 10px 0 8px; font-size: 11px; font-weight: 500; color: #888780;
  border-bottom: 0.5px solid #e0ddd6;
}
.c-bot {
  height: 30px; display: flex; align-items: center;
  padding: 0 10px 0 8px; font-size: 10px; color: #888780;
}
#hdr-timeline { flex: 0 0 1596px; display: flex; flex-direction: column; }
#hdr-months { height: 24px; display: flex; align-items: stretch; border-bottom: 0.5px solid #e0ddd6; }
#hdr-dow    { height: 30px; display: flex; align-items: center; }
#body { overflow-x: auto; border-radius: 0 0 12px 12px; }
#body-inner { min-width: 2036px; }
.g-row { display: flex; align-items: stretch; }
.lbl {
  flex: 0 0 280px; position: sticky; left: 0; z-index: 10;
  background: #fff; border-right: 0.5px solid #e0ddd6;
  display: flex; align-items: center; padding: 5px 10px 5px 8px;
}
.note-col {
  flex: 0 0 160px; position: sticky; left: 280px; z-index: 10;
  background: #fff; border-right: 0.5px solid #e0ddd6;
  display: flex; align-items: flex-start; padding: 5px 6px;
}
.note-col textarea {
  width: 100%; border: none; outline: none; resize: none;
  font-family: inherit; font-size: 10px; color: #5f5e5a;
  background: transparent; line-height: 1.5; min-height: 22px;
  overflow: hidden;
}
.note-col textarea::placeholder { color: #c8c6c0; }
.trk { flex: 0 0 1596px; position: relative; overflow: hidden; }
.wk { background-color: #faf9f7; }
.trk.wk { background-color: transparent; }
.phase-row { background: #faf9f7; border-top: 1px solid #e0ddd6; border-bottom: 0.5px solid #e8e5de; }
.phase-row .lbl, .phase-row .note-col { background: #faf9f7; }
.task-row { border-bottom: 0.5px solid #f0ede7; }
.task-row:hover .lbl, .task-row:hover .note-col { background: #faf8f5; }
.task-lbl { display: flex; align-items: flex-start; gap: 6px; width: 100%; }
.task-lbl input[type=checkbox] { margin-top: 2px; flex-shrink: 0; width: 13px; height: 13px; }
.t-n { font-size: 11px; color: #3d3c3a; line-height: 1.45; display: block; }
.t-n.done { text-decoration: line-through; color: #b4b2a9; }
.t-m { font-size: 10px; color: #aaa; display: block; margin-top: 1px; }
.bar-bg { position: absolute; height: 14px; border-radius: 3px; top: 50%; transform: translateY(-50%); }
.bar-fg { position: absolute; height: 14px; border-radius: 3px; top: 50%; transform: translateY(-50%); transition: width .25s ease; }
#scroll-rail {
  position: fixed; bottom: 0; height: 14px; z-index: 200;
  overflow-x: scroll; overflow-y: hidden;
  background: #f0ede8; border-top: 0.5px solid #d3d1c7;
}
#scroll-inner { height: 1px; width: 2036px; }
</style>
</head>
<body>
<h1>2027 Budget Timeline</h1>
<p class="sub">August 20 – December 11, 2026 &nbsp;·&nbsp; Finance / Inception Fertility</p>
<div class="legend" id="leg"></div>
<div class="card">
  <div id="hdr">
    <div id="hdr-inner">
      <div id="corner">
        <div id="corner-task">
          <div class="c-top">Task</div>
          <div class="c-bot">Assignee</div>
        </div>
        <div id="corner-notes">
          <div class="c-top">Notes</div>
          <div class="c-bot"></div>
        </div>
      </div>
      <div id="hdr-timeline" style="position:relative">
        <div id="hdr-months" class="wk"></div>
        <div id="hdr-dow"    class="wk"></div>
        <div id="hdr-hl" style="display:none;position:absolute;top:0;height:100%;pointer-events:none;z-index:5;border-radius:3px;border-bottom:2px solid"></div>
      </div>
    </div>
  </div>
  <div id="body">
    <div id="body-inner"></div>
  </div>
</div>
<div id="scroll-rail"><div id="scroll-inner"></div></div>
<script>
const PS   = new Date(2026, 7, 20);
const PE   = new Date(2026, 11, 11);
const DW   = 14;
const DAYS = 114;
const SD   = 4;
const DOW  = ['S','M','T','W','T','F','S'];
const fd   = d => d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
const dOff = d => Math.round((d - PS) / 864e5);
const dDur = (s, e) => Math.round((e - s) / 864e5) + 1;

const GH_TOKEN   = 'github_pat_11CGXHD3A0TWaRfYoEEuco' + '_eZsqIWCRPzeO4ogJfgEOMhOkyReo92tAIrQkoT1geEFTO6HXLDL1T9gAEXK';
const GH_REPO    = 'wpantoja123/2027-Budget-Timeline';
const STATE_FILE = 'state.json';
const EDIT_MODE  = location.hash === '#edit';
let   ghState    = {};
let   stateSha   = null;
const TASK_W     = {};

async function syncState() {
  try {
    const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${STATE_FILE}`,
      { headers: { Authorization: `Bearer ${GH_TOKEN}` } });
    if (!r.ok) return;
    const d = await r.json();
    stateSha = d.sha;
    const fresh = JSON.parse(atob(d.content.replace(/\n/g,'')));
    Object.entries(fresh).forEach(([id, done]) => {
      if (ghState[id] !== done) { ghState[id] = done; applyTask(id, done); }
    });
  } catch(e) {}
}

async function pushState() {
  try {
    const body = { message:'Update task state', content:btoa(JSON.stringify(ghState)) };
    if (stateSha) body.sha = stateSha;
    const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${STATE_FILE}`,
      { method:'PUT', headers:{ Authorization:`Bearer ${GH_TOKEN}`, 'Content-Type':'application/json' },
        body:JSON.stringify(body) });
    if (r.ok) { const d = await r.json(); stateSha = d.content.sha; }
    else if (r.status === 409) { await syncState(); await pushState(); }
  } catch(e) {}
}

function applyTask(id, done) {
  const cb = document.getElementById('cb-' + id);
  const fg = document.getElementById('fg-' + id);
  const nm = document.getElementById('nm-' + id);
  if (cb) cb.checked = done;
  const w = TASK_W[id] || 0;
  if (fg) { fg.style.width = (done ? w : 0) + 'px'; fg.style.minWidth = done ? '3px' : '0'; }
  if (nm) nm.classList.toggle('done', done);
}

async function tog(id) {
  if (!EDIT_MODE) return;
  ghState[id] = !ghState[id];
  applyTask(id, ghState[id]);
  await pushState();
}

function saveNote(id) {
  const ta = document.getElementById('note-' + id);
  if (ta) localStorage.setItem('note27-' + id, ta.value);
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

const HOLIDAYS = [
  new Date(2026,8,7), new Date(2026,10,23), new Date(2026,10,24),
  new Date(2026,10,25), new Date(2026,10,26), new Date(2026,10,27),
];
const WES_OOO = [
  new Date(2026,7,24), new Date(2026,7,25), new Date(2026,7,26), new Date(2026,7,27), new Date(2026,7,28),
  new Date(2026,7,31), new Date(2026,8,1), new Date(2026,8,3), new Date(2026,8,4), new Date(2026,8,8),
  new Date(2026,8,10), new Date(2026,8,11), new Date(2026,8,15), new Date(2026,8,16), new Date(2026,8,17),
  new Date(2026,8,21), new Date(2026,8,22), new Date(2026,8,24), new Date(2026,8,28), new Date(2026,8,29),
  new Date(2026,9,1), new Date(2026,9,5), new Date(2026,9,6), new Date(2026,9,15), new Date(2026,9,20),
  new Date(2026,9,23), new Date(2026,9,26), new Date(2026,9,30), new Date(2026,10,5), new Date(2026,10,6),
];
const mkGrads = (dates, color) => dates
  .filter(d => d >= PS && d <= PE)
  .map(d => { const x = dOff(d)*DW; return `linear-gradient(90deg,transparent ${x}px,${color} ${x}px,${color} ${x+DW}px,transparent ${x+DW}px)`; })
  .join(',');
const MONTH_LINES = [12,42,73,103].map(d => {
  const x = d*DW;
  return `linear-gradient(90deg,transparent ${x-1}px,#c8c5bf ${x-1}px,#c8c5bf ${x}px,transparent ${x}px)`;
}).join(',');
const WG = [
  MONTH_LINES,
  `repeating-linear-gradient(90deg,transparent 0,transparent ${2*DW}px,#e0ddd8 ${2*DW}px,#e0ddd8 ${4*DW}px,transparent ${4*DW}px,transparent ${7*DW}px)`,
  mkGrads(HOLIDAYS,'#e0ddd8'),
  mkGrads(WES_OOO,'#fddcb4'),
].filter(Boolean).join(',');

const PH = [
  {id:'p0',name:'Setup & initial budget',c:'#378ADD',bg:'#E6F1FB',ct:'#0C447C',tasks:[
    {id:'t0', n:'Create new budget version, load & check formulas',         a:'Finance',      s:new Date(2026,7,20),e:new Date(2026,7,26)},
    {id:'t1', n:'Send "Budget Season" email to COO & operators',            a:'Finance',      s:new Date(2026,7,27),e:new Date(2026,7,28)},
    {id:'t2', n:'Send KPI, Census, CAPEX email to RVPs w/deadline',         a:'Finance',      s:new Date(2026,8,2), e:new Date(2026,8,8)},
    {id:'t3', n:'Vacancy and allocations (CS & Ops Alloc)',                  a:'Finance',      s:new Date(2026,8,4), e:new Date(2026,8,8)},
    {id:'t4', n:'Upload KPI, Census and CAPEX changes',                      a:'Finance',      s:new Date(2026,8,11),e:new Date(2026,8,14)},
    {id:'t5', n:'Accounting run rate file email w/ deadline',                a:'Finance',      s:new Date(2026,8,11),e:new Date(2026,8,18)},
    {id:'t6', n:'Board prep/review (months tbd)',                            a:'All',          s:new Date(2026,8,11),e:new Date(2026,8,24)},
    {id:'t7', n:'Monthly prelim, MOR & meeting',                             a:'All',          s:new Date(2026,8,17),e:new Date(2026,8,23)},
    {id:'t8', n:'Review all budget files for 1st pass submission',           a:'Finance',      s:new Date(2026,8,22),e:new Date(2026,8,25)},
  ]},
  {id:'p1',name:'1st & 2nd pass of budget',c:'#1D9E75',bg:'#E1F5EE',ct:'#085041',tasks:[
    {id:'t9', n:'1st pass budget to RVPs w/ deadline!',                     a:'Finance/RVPs', s:new Date(2026,8,25),e:new Date(2026,8,29)},
    {id:'t10',n:'FPA review "1st pass" feedback from RVPs',                 a:'Finance',      s:new Date(2026,8,29),e:new Date(2026,9,1)},
    {id:'t11',n:'2nd pass budget to RVP w/ deadline!',                      a:'Finance/RVPs', s:new Date(2026,9,2), e:new Date(2026,9,6)},
    {id:'t12',n:'FPA review "2nd pass" feedback from RVPs',                 a:'Finance',      s:new Date(2026,9,7), e:new Date(2026,9,9)},
  ]},
  {id:'p2',name:'Management approval',c:'#BA7517',bg:'#FAEEDA',ct:'#633806',tasks:[
    {id:'t13',n:'Round 1 submission to RVPs',                                a:'Finance',      s:new Date(2026,9,9), e:new Date(2026,9,9)},
    {id:'t14',n:'RD 1 — RVPs present budget to Mgmt',                       a:'RVPs',         s:new Date(2026,9,12),e:new Date(2026,9,13)},
    {id:'t15',n:'Monthly prelim, MOR & meeting',                             a:'All',          s:new Date(2026,9,14),e:new Date(2026,9,21)},
    {id:'t16',n:'Adjustments & RD 2 file sent to Ops',                      a:'Finance',      s:new Date(2026,9,16),e:new Date(2026,9,29)},
    {id:'t17',n:'ASRM Conference',                                           a:'Ops',          s:new Date(2026,9,24),e:new Date(2026,9,28)},
    {id:'t18',n:'RD 2 — RVPs present budget to Mgmt (in person)',           a:'RVPs',         s:new Date(2026,10,3),e:new Date(2026,10,4)},
    {id:'t19',n:'Adjustments from RD 2 calls',                              a:'Finance',      s:new Date(2026,10,5),e:new Date(2026,10,10)},
    {id:'t20',n:'Monthly prelim, MOR & meeting',                             a:'All',          s:new Date(2026,10,11),e:new Date(2026,10,18)},
    {id:'t21',n:'Improvement budget & vacancy addition',                     a:'Finance',      s:new Date(2026,10,16),e:new Date(2026,10,20)},
    {id:'t22',n:'Review census thru Oct & Sept financial actuals',           a:'Finance',      s:new Date(2026,10,16),e:new Date(2026,10,20)},
    {id:'t23',n:'Thanksgiving week',                                         a:'Finance',      s:new Date(2026,10,23),e:new Date(2026,10,27)},
  ]},
  {id:'p3',name:'Board meeting',c:'#7F77DD',bg:'#EEEDFE',ct:'#3C3489',tasks:[
    {id:'t24',n:'Create budget package for board',                           a:'Finance',      s:new Date(2026,10,30),e:new Date(2026,11,1)},
    {id:'t25',n:'Management review of board budget package',                 a:'Management',   s:new Date(2026,11,2), e:new Date(2026,11,3)},
    {id:'t26',n:'Finalized budget package for board (pres. 12/10)',         a:'Finance',      s:new Date(2026,11,4), e:new Date(2026,11,4)},
  ]},
  {id:'p4',name:'Finalize budget',c:'#D85A30',bg:'#FAECE7',ct:'#712B13',tasks:[
    {id:'t27',n:'Lock budget in Adaptive & adjust reports to use new budget',a:'Finance',      s:new Date(2026,11,7), e:new Date(2026,11,11)},
  ]},
];

document.getElementById('leg').innerHTML = [
  ...PH.map(p=>`<div class="leg"><div class="leg-dot" style="background:${p.c}"></div>${p.name}</div>`),
  `<div style="width:100%;height:0"></div>`,
  `<div class="leg"><div class="leg-dot" style="background:#e0ddd8;border:0.5px solid #c8c5bf"></div>Weekend / holiday</div>`,
  `<div class="leg"><div class="leg-dot" style="background:#fddcb4;border:0.5px solid #deb8b8"></div>Wes OOO</div>`,
].join('');

const MNTHS = [{l:'August',n:12},{l:'September',n:30},{l:'October',n:31},{l:'November',n:30},{l:'December',n:11}];
document.getElementById('hdr-months').style.backgroundImage = 'none';
document.getElementById('hdr-months').innerHTML = MNTHS.map(m=>
  `<div style="width:${m.n*DW}px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#888780;border-right:0.5px solid #d3d1c7">${m.l}</div>`
).join('');

document.getElementById('hdr-dow').style.backgroundImage = 'none';
let dowHtml = '';
for (let i=0;i<DAYS;i++){
  const dow=(SD+i)%7, wknd=dow===0||dow===6;
  const date=new Date(PS.getTime()+i*864e5);
  dowHtml+=`<div style="width:${DW}px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px">
    <span style="font-size:9px;line-height:1;color:${wknd?'#c0bdb5':'#888780'}">${DOW[dow]}</span>
    ${!wknd?`<span style="font-size:8px;line-height:1;color:#b4b2a9">${date.getDate()}</span>`:''}
  </div>`;
}
document.getElementById('hdr-dow').innerHTML=dowHtml;

let bodyHtml='';
PH.forEach(ph=>{
  bodyHtml+=`<div class="g-row phase-row" style="height:26px">
    <div class="lbl"><span style="font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;background:${ph.bg};color:${ph.ct}">${ph.name}</span></div>
    <div class="note-col"></div>
    <div class="trk wk" style="background-image:${WG}"></div>
  </div>`;
  ph.tasks.forEach(t=>{
    const off=dOff(t.s)*DW, w=dDur(t.s,t.e)*DW;
    TASK_W[t.id]=w;
    bodyHtml+=`<div class="g-row task-row" style="min-height:36px">
      <div class="lbl">
        <label class="task-lbl" style="${EDIT_MODE?'cursor:pointer':'cursor:default'}">
          <input type="checkbox" id="cb-${t.id}" style="accent-color:${ph.c};${EDIT_MODE?'cursor:pointer':'pointer-events:none;opacity:0.5'}" onclick="tog('${t.id}')">
          <span style="flex:1">
            <span class="t-n" id="nm-${t.id}">${t.n}</span>
            <span class="t-m">${t.a} &middot; ${fd(t.s)} &ndash; ${fd(t.e)}</span>
          </span>
        </label>
      </div>
      <div class="note-col">
        <textarea id="note-${t.id}" placeholder="Add note…" oninput="saveNote('${t.id}');autoResize(this)"></textarea>
      </div>
      <div class="trk wk" style="background-image:${WG}">
        <div class="bar-bg" id="bg-${t.id}" style="left:${off}px;width:${w}px;background:${ph.c};opacity:0.2;transition:opacity .15s"></div>
        <div class="bar-fg" id="fg-${t.id}" style="left:${off}px;width:0px;background:${ph.c};transition:filter .15s"></div>
        <div style="position:absolute;left:${off}px;width:${w}px;top:0;bottom:0;cursor:default" onmouseenter="hlBar(${off},${w},'${ph.c}','${t.id}')" onmouseleave="hlBar()"></div>
      </div>
    </div>`;
  });
});
document.getElementById('body-inner').innerHTML=bodyHtml;

// Restore saved notes
PH.forEach(ph=>ph.tasks.forEach(t=>{
  const ta=document.getElementById('note-'+t.id);
  const saved=localStorage.getItem('note27-'+t.id);
  if(ta&&saved){ta.value=saved;autoResize(ta);}
}));

// ── Scroll sync ──
const hdr  = document.getElementById('hdr');
const body = document.getElementById('body');
const rail = document.getElementById('scroll-rail');

function positionRail(){
  const rect=body.getBoundingClientRect();
  rail.style.left=rect.left+'px';
  rail.style.width=rect.width+'px';
}
positionRail();
window.addEventListener('resize',positionRail);

let syncing=false;
body.addEventListener('scroll',()=>{
  if(syncing)return; syncing=true;
  hdr.scrollLeft=body.scrollLeft;
  rail.scrollLeft=body.scrollLeft;
  syncing=false;
});
rail.addEventListener('scroll',()=>{
  if(syncing)return; syncing=true;
  body.scrollLeft=rail.scrollLeft;
  hdr.scrollLeft=rail.scrollLeft;
  syncing=false;
});

// ── Bar hover highlight ──
const hl=document.getElementById('hdr-hl');
let _curId=null;
function hlBar(off,w,color,id){
  if(_curId){
    const pb=document.getElementById('bg-'+_curId),pf=document.getElementById('fg-'+_curId);
    if(pb)pb.style.opacity='0.2'; if(pf)pf.style.filter=''; _curId=null;
  }
  if(off===undefined){hl.style.display='none';return;}
  hl.style.left=off+'px'; hl.style.width=w+'px';
  hl.style.background=color+'28'; hl.style.borderColor=color; hl.style.display='block';
  if(id){
    const bg=document.getElementById('bg-'+id),fg=document.getElementById('fg-'+id);
    if(bg)bg.style.opacity='0.45'; if(fg)fg.style.filter='brightness(1.15)'; _curId=id;
  }
}

syncState();
setInterval(syncState,30000);
</script>
</body>
</html>
